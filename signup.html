<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - UNIQUE ASTRO</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

<div class="auth-box">

<h1>Create Account</h1>

<form id="signupForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Create Account

</button>

</form>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

createUserWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

getFirestore,

doc,

setDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyB26iL7yascJvQXRKdkI5mqf5J1gazVuMg",

authDomain:"unique-astro.firebaseapp.com",

projectId:"unique-astro",

storageBucket:"unique-astro.firebasestorage.app",

messagingSenderId:"570060771424",

appId:"1:570060771424:web:1ca759ef4a1345fa1ab305"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

document.getElementById("signupForm")

.addEventListener("submit",async(e)=>{

e.preventDefault();

const name=document.getElementById("name").value;

const email=document.getElementById("email").value;

const mobile=document.getElementById("mobile").value;

const password=document.getElementById("password").value;

try{

const user=await createUserWithEmailAndPassword(

auth,

email,

password

);

await setDoc(doc(db,"users",user.user.uid),{

name,

email,

mobile,

tokens:20,

createdAt:new Date()

});

alert("Account Created Successfully");

window.location.href="dashboard.html";

}

catch(err){

alert(err.message);

}

});

</script>

</body>
</html>
