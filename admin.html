<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIQUE ASTRO Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#08121f;
color:white;
font-family:Poppins,sans-serif;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
border-bottom:2px solid gold;
}

header h2{
color:gold;
}

.logout-btn{
background:#e53935;
color:#fff;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#13253d;
padding:20px;
border-radius:15px;
text-align:center;
}

.card h1{
color:gold;
font-size:35px;
}

.statusBtn{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

.online{
background:#16a34a;
color:white;
}

.offline{
background:#dc2626;
color:white;
}

</style>

</head>

<body>

<header>

<h2>UNIQUE ASTRO ADMIN</h2>

<button id="logoutBtn" class="logout-btn">
Logout
</button>

</header>

<div class="container">
<hr style="margin:35px 0">

<h2 style="color:gold;">
👥 All Users
</h2>

<input
type="text"
id="searchUser"
placeholder="Search by Name / Email / Mobile"
style="
width:100%;
padding:15px;
margin:20px 0;
border-radius:12px;
border:none;
font-size:16px;
">

<div id="usersList"></div>
<div class="grid">

<div class="card">
<h3>Total Users</h3>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h3>Pending Payments</h3>
<h1 id="pendingPayments">0</h1>
</div>

<div class="card">
<h3>Pending Calls</h3>
<h1 id="pendingCalls">0</h1>
</div>

<div class="card">

<h3>Astrologer Status</h3>

<button
id="statusBtn"
class="statusBtn online">

ONLINE

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

getFirestore,
doc,
getDoc,
setDoc,
collection,
onSnapshot,
updateDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyB26iL7yascJvQXRKdkI5mqf5J1gazVuMg",

authDomain:"unique-astro.firebaseapp.com",

projectId:"unique-astro",

storageBucket:"unique-astro.firebasestorage.app",

messagingSenderId:"570060771424",

appId:"1:570060771424:web:1ca759ef4a1345fa1ab305"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="admin-login.html";

return;

}

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){

location.href="login.html";

return;

}

if(snap.data().role!="admin"){

alert("Access Denied");

location.href="login.html";

return;

}

});

const statusBtn=document.getElementById("statusBtn");

let online=true;

statusBtn.onclick=async()=>{

online=!online;

await setDoc(

doc(db,"system","availability"),

{

busy:!online

}

);

if(online){

statusBtn.innerHTML="ONLINE";

statusBtn.className="statusBtn online";

}else{

statusBtn.innerHTML="BUSY";

statusBtn.className="statusBtn offline";

}

};

const usersList =
document.getElementById("usersList");

onSnapshot(

collection(db,"users"),

(snapshot)=>{

usersList.innerHTML="";

let total=0;

snapshot.forEach((docu)=>{

total++;

const data=docu.data();

usersList.innerHTML +=`

<div
style="
background:#13253d;
padding:20px;
margin:15px 0;
border-radius:15px;
">

<h3>${data.name}</h3>

<p>📧 ${data.email}</p>

<p>📱 ${data.mobile}</p>

<p>

🪙 Tokens :

<b id="token_${docu.id}">

${data.tokens}

</b>

</p>

<button
onclick="addToken('${docu.id}')">

+20 Tokens

</button>

<button
onclick="removeToken('${docu.id}')">

-20 Tokens

</button>

</div>

`;

});

document.getElementById("totalUsers").innerHTML=total;

});

window.addToken = async(uid)=>{

const ref=doc(db,"users",uid);

const snap=await getDoc(ref);

let token=snap.data().tokens;

await updateDoc(ref,{

tokens:token+20

});

};

window.removeToken = async(uid)=>{

const ref=doc(db,"users",uid);

const snap=await getDoc(ref);

let token=snap.data().tokens;

if(token>=20){

await updateDoc(ref,{

tokens:token-20

});

}

};

document.getElementById("logoutBtn").onclick=()=>{

localStorage.removeItem("adminLoggedIn");

window.location.href="admin-login.html";

};

</script>
<script>

if(localStorage.getItem("adminLoggedIn")!=="true"){

window.location.href="admin-login.html";

}

</script>
</body>
</html>
