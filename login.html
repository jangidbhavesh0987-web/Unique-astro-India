<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - UNIQUE ASTRO</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

<div class="auth-box">

<h1>Login</h1>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,

signInWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={

apiKey:"AIzaSyB26iL7yascJvQXRKdkI5mqf5J1gazVuMg",

authDomain:"unique-astro.firebaseapp.com",

projectId:"unique-astro",

storageBucket:"unique-astro.firebasestorage.app",

messagingSenderId:"570060771424",

appId:"1:570060771424:web:1ca759ef4a1345fa1ab305"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

document.getElementById("loginForm")

.addEventListener("submit",async(e)=>{

e.preventDefault();

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

alert("Login Successful");

window.location.href="dashboard.html";

}

catch(err){

alert(err.message);

}

});

</script>

</body>
</html>
